name: Build

on:
  push:
    branches:
      - develop
      - master
      - 'github-releases/**'
  pull_request:
    branches:
      - develop
      - master

jobs:
  build:
    runs-on: vps3-docker-light
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APKs
        run: |
          set -euo pipefail
          CURRENT_VERSION_NAME="$(grep -m1 -E '\s+versionName "[^"]+"' ./app/build.gradle | sed -r 's/.*versionName "([^"]+)"/\1/')"
          COMMIT_SHORT="$(git rev-parse --short=7 HEAD)"
          RELEASE_VERSION_NAME="v${CURRENT_VERSION_NAME}+${COMMIT_SHORT}"

          export TERMUX_APP_VERSION_NAME="${CURRENT_VERSION_NAME}"
          export TERMUX_APK_VERSION_TAG="${RELEASE_VERSION_NAME}-${{ matrix.package_variant }}-debug"
          export TERMUX_PACKAGE_VARIANT="${{ matrix.package_variant }}"

          echo "Building ${RELEASE_VERSION_NAME} (${TERMUX_PACKAGE_VARIANT})"
          ./gradlew assembleDebug --no-daemon --stacktrace

          echo "=== Build complete ==="
          find ./app/build/outputs/apk -name '*.apk' -type f

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: termux-ai-arm64-v8a
          path: ./app/build/outputs/apk/debug/*arm64-v8a*.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: termux-ai-universal
          path: ./app/build/outputs/apk/debug/*universal*.apk
