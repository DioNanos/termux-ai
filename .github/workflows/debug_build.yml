name: Build

on:
  push:
    branches:
      - develop
      - master
      - 'github-releases/**'
  pull_request:
    branches:
      - develop
      - master

jobs:
  build:
    runs-on: vps3-docker-light
    steps:
      - name: Build APK
        run: |
          set -euo pipefail
          echo "=== Build environment ==="
          java -version 2>&1 || true
          which javac 2>&1 || true
          pwd
          ls -la
          echo "=== Building ==="
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "=== Output ==="
          find ./app/build/outputs -name '*.apk' -type f
